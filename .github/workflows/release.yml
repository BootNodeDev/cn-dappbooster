name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

concurrency:
  group: release-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  carpincho-extension:
    runs-on: ubuntu-latest
    env:
      TAG: ${{ github.event.release.tag_name }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci
        env:
          HUSKY: 0 # disable git hooks in CI checkout

      - name: Resolve and validate version
        run: |
          VERSION="${TAG#v}"
          PKG_VERSION="$(node -p "require('./package.json').version")"
          if [ "$VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Release tag \"$TAG\" (version \"$VERSION\") does not match root package.json version \"$PKG_VERSION\". Bump it with 'npm version' and tag that commit."
            exit 1
          fi
          export VERSION
          node -e '
            const v = process.env.VERSION.split(/[-+]/)[0];
            const parts = v.split(".");
            const valid =
              parts.length >= 1 && parts.length <= 4 &&
              parts.every((p) => /^(0|[1-9][0-9]{0,4})$/.test(p) && Number(p) <= 65535);
            if (!valid) {
              console.error(`::error::Version "${process.env.VERSION}" does not yield a Chrome-valid manifest version (need 1-4 dot-separated integers 0-65535, no leading zeros).`);
              process.exit(1);
            }
          '
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "resolved version $VERSION"

      - name: Lint
        run: npm --prefix carpincho-wallet run lint

      - name: Build extension
        run: npm --prefix carpincho-wallet run build:extension

      - name: Test
        run: npm --prefix carpincho-wallet run test

      - name: Zip extension
        run: |
          cd carpincho-wallet/dist-extension
          if [ -z "$(ls -A)" ]; then
            echo "::error::Build output carpincho-wallet/dist-extension is empty; aborting."
            exit 1
          fi
          zip -r "$GITHUB_WORKSPACE/carpincho-wallet-${VERSION}.zip" .

      - name: Upload asset to release
        run: gh release upload "$TAG" "carpincho-wallet-${VERSION}.zip" --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
