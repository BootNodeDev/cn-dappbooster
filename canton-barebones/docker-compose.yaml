services:
  wallet-gateway:
    image: node:24-alpine
    container_name: canton-barebones-wallet-gateway
    command:
      - sh
      - -c
      - npm exec --yes @canton-network/wallet-gateway-remote@1.4.0 -- -c /config/wallet-gateway.localnet.json
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./config/wallet-gateway/localnet.json:/config/wallet-gateway.localnet.json:ro
      - wallet-gateway-data:/data
    ports:
      - "3010:3030"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3030/readyz >/dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 5s

  wallet-service:
    build:
      context: ..
      dockerfile: canton-barebones/wallet-service/Dockerfile
    container_name: canton-barebones-wallet-service
    depends_on:
      wallet-gateway:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      WALLET_GATEWAY_UPSTREAM_URL: "http://wallet-gateway:3030"
      CANTON_BACKEND_TOKEN: "${CANTON_BACKEND_TOKEN}"
      CANTON_JSON_API_URL: "http://host.docker.internal:2975"
      CANTON_LEDGER_API_URL: "grpc://host.docker.internal:2901"
      CANTON_ADMIN_API_URL: "grpc://host.docker.internal:2902"
      SPLICE_VALIDATOR_URL: "${SPLICE_VALIDATOR_URL:-http://host.docker.internal:2000/api/validator}"
      SPLICE_SCAN_API_URL: "${SPLICE_SCAN_API_URL:-http://host.docker.internal:4000/api/scan}"
      SPLICE_REGISTRY_API_URL: "${SPLICE_REGISTRY_API_URL:-http://host.docker.internal:2000/api/validator/v0/scan-proxy}"
      WALLET_SERVICE_PORT: "3010"
      WALLET_SERVICE_CORS_ORIGINS: "${WALLET_SERVICE_CORS_ORIGINS:-http://localhost:3013}"
      NETWORK: "${NETWORK:-canton:localnet}"
      WALLET_PROVIDER_ID: "${WALLET_PROVIDER_ID:-wallet-service}"
      WALLET_PROVIDER_VERSION: "${WALLET_PROVIDER_VERSION:-0.1.0}"
      WALLET_PROVIDER_URL: "${WALLET_PROVIDER_URL:-http://localhost:3011}"
      WALLET_PROVIDER_USER_URL: "${WALLET_PROVIDER_USER_URL:-http://localhost:3011}"
      WALLET_SERVICE_MOCK: "${WALLET_SERVICE_MOCK:-}"
    ports:
      - "3011:3010"

volumes:
  wallet-gateway-data:
