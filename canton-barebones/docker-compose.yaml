services:
  wallet-gateway:
    image: node:24-alpine
    container_name: canton-barebones-wallet-gateway
    command:
      - sh
      - -c
      - npm exec --yes @canton-network/wallet-gateway-remote@1.4.0 -- -c /config/wallet-gateway.localnet.json
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./config/wallet-gateway/localnet.json:/config/wallet-gateway.localnet.json:ro
      - wallet-gateway-data:/data
    ports:
      - "3010:3030"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3030/readyz >/dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 5s

  wallet-gateway-devkit:
    build:
      context: ..
      dockerfile: canton-barebones/wallet-gateway-devkit/Dockerfile
    container_name: canton-barebones-wallet-gateway-devkit
    depends_on:
      wallet-gateway:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      CANTON_ENVIRONMENT: "${CANTON_ENVIRONMENT:-localnet}"
    volumes:
      - type: bind
        source: ./.env
        target: /app/canton-barebones/wallet-gateway-devkit/.env
        read_only: true
        bind:
          create_host_path: false
    ports:
      - "3011:3010"

volumes:
  wallet-gateway-data:
