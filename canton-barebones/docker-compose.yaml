services:
  wallet-service:
    build:
      context: ..
      dockerfile: canton-barebones/wallet-service/Dockerfile
    container_name: canton-barebones-wallet-service
    extra_hosts:
      - "host.docker.internal:host-gateway"
      # Resolve the scan vhost to the host so the container both reaches the scan
      # and sends Host: scan.localhost (the nginx vhost the scan routes on).
      - "scan.localhost:host-gateway"
    environment:
      CANTON_BACKEND_TOKEN: "${CANTON_BACKEND_TOKEN}"
      # Splice LocalNet app-provider participant (39xx family). The bootstrap
      # talks to the same JSON API (:3975); the 29xx family is a different
      # participant whose JSON API does not answer here.
      CANTON_JSON_API_URL: "${CANTON_JSON_API_URL:-http://host.docker.internal:3975}"
      CANTON_LEDGER_API_URL: "${CANTON_LEDGER_API_URL:-grpc://host.docker.internal:3901}"
      CANTON_ADMIN_API_URL: "${CANTON_ADMIN_API_URL:-grpc://host.docker.internal:3902}"
      SPLICE_VALIDATOR_URL: "${SPLICE_VALIDATOR_URL:-http://host.docker.internal:3903/api/validator}"
      SPLICE_SCAN_API_URL: "${SPLICE_SCAN_API_URL:-http://scan.localhost:4000/api/scan}"
      SPLICE_REGISTRY_API_URL: "${SPLICE_REGISTRY_API_URL:-http://host.docker.internal:3903/api/validator/v0/scan-proxy}"
      WALLET_SERVICE_PORT: "3010"
      WALLET_SERVICE_CORS_ORIGINS: "${WALLET_SERVICE_CORS_ORIGINS:-http://localhost:3011}"
      NETWORK: "${NETWORK:-canton:localnet}"
      WALLET_PROVIDER_ID: "${WALLET_PROVIDER_ID:-wallet-service}"
      WALLET_PROVIDER_VERSION: "${WALLET_PROVIDER_VERSION:-0.1.0}"
      WALLET_PROVIDER_URL: "${WALLET_PROVIDER_URL:-http://localhost:3010}"
      WALLET_PROVIDER_USER_URL: "${WALLET_PROVIDER_USER_URL:-http://localhost:3010}"
      WALLET_SERVICE_MOCK: "${WALLET_SERVICE_MOCK:-}"
    ports:
      - "${WALLET_SERVICE_PORT:-3010}:3010"
