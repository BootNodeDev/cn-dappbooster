services:
  wallet-gateway:
    image: node:24-alpine
    container_name: canton-barebones-wallet-gateway
    command:
      - sh
      - -c
      - npm exec --yes @canton-network/wallet-gateway-remote@1.4.0 -- -c /config/wallet-gateway.json
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - ./env/.env.wallet-gateway
    volumes:
      - ${WALLET_GATEWAY_CONFIG:-./config/wallet-gateway/config.json}:/config/wallet-gateway.json:ro
      - wallet-gateway-data:/data
    ports:
      - "${WALLET_GATEWAY_PORT:-3010}:3030"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3030/readyz >/dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 5s

  wallet-gateway-tools:
    build:
      context: ..
      dockerfile: canton-barebones/wallet-gateway-tools/Dockerfile
    container_name: canton-barebones-wallet-gateway-tools
    depends_on:
      wallet-gateway:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - ./env/.env.wallet-gateway-tools
    ports:
      - "${WALLET_GATEWAY_TOOLS_PORT:-3011}:3010"

volumes:
  wallet-gateway-data:
