services:
  wallet-service:
    build:
      context: ..
      dockerfile: canton-barebones/wallet-service/Dockerfile
    container_name: canton-barebones-wallet-service
    environment:
      FIVENORTH_AUTH_URL: "${FIVENORTH_AUTH_URL:-https://auth.sandbox.fivenorth.io/application/o/token/}"
      FIVENORTH_CLIENT_ID: "${FIVENORTH_CLIENT_ID:-validator-devnet-m2m}"
      FIVENORTH_CLIENT_SECRET: "${FIVENORTH_CLIENT_SECRET:?Set FIVENORTH_CLIENT_SECRET in canton-barebones/.env.fivenorth or your shell}"
      FIVENORTH_SCOPE: "${FIVENORTH_SCOPE:-daml_ledger_api}"
      CANTON_JSON_API_URL: "${CANTON_JSON_API_URL:-https://ledger-api.validator.devnet.sandbox.fivenorth.io}"
      CANTON_LEDGER_API_URL: "${CANTON_LEDGER_API_URL:-https://ledger-api.validator.devnet.sandbox.fivenorth.io}"
      CANTON_ADMIN_API_URL: "${CANTON_ADMIN_API_URL:-}"
      SPLICE_VALIDATOR_URL: "${SPLICE_VALIDATOR_URL:-https://wallet.validator.devnet.sandbox.fivenorth.io/api/validator}"
      SPLICE_REGISTRY_API_URL: "${SPLICE_REGISTRY_API_URL:-https://wallet.validator.devnet.sandbox.fivenorth.io/api/validator/v0/scan-proxy}"
      WALLET_SERVICE_PORT: "3010"
      WALLET_SERVICE_CORS_ORIGINS: "${WALLET_SERVICE_CORS_ORIGINS:-http://localhost:3011}"
      NETWORK: "${NETWORK:-canton:fivenorth-devnet}"
      WALLET_PROVIDER_ID: "${WALLET_PROVIDER_ID:-wallet-service}"
      WALLET_PROVIDER_VERSION: "${WALLET_PROVIDER_VERSION:-0.1.0}"
      WALLET_PROVIDER_URL: "${WALLET_PROVIDER_URL:-http://localhost:3010}"
      WALLET_PROVIDER_USER_URL: "${WALLET_PROVIDER_USER_URL:-http://localhost:3010}"
    ports:
      - "${WALLET_SERVICE_PORT:-3010}:3010"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3010/health >/dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s
