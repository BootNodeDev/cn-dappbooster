<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#08080f" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="canonical" href="https://cc-vesting-contracts-ui.vercel.app/" />
    <title>Canton Vesting</title>
    <meta name="description" content="Vesting dashboard for cc-vesting-contracts on Canton" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Canton Coin Vesting" />
    <meta
      property="og:description"
      content="Watch escrowed Canton Coin vest over time and claim what is ready, on the Canton ledger."
    />
    <meta property="og:url" content="https://cc-vesting-contracts-ui.vercel.app/" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Canton Coin Vesting" />
    <meta
      name="twitter:description"
      content="Watch escrowed Canton Coin vest over time and claim what is ready, on the Canton ledger."
    />
    <script>
      // Set theme before first paint to avoid a flash.
      (() => {
        try {
          const stored = localStorage.getItem("cc-vesting-theme")
          const dark = stored ? stored === "dark" : matchMedia("(prefers-color-scheme: dark)").matches
          document.documentElement.dataset.theme = dark ? "dark" : "light"
        } catch {
          document.documentElement.dataset.theme = "dark"
        }
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
